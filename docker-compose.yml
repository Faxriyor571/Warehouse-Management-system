# Local development database.
# Ishga tushirish:  docker compose up -d
# To'xtatish:       docker compose down
# Ma'lumotlar `pgdata` volume da saqlanadi.

services:
  db:
    image: postgres:16-alpine
    container_name: wms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms_password}
      POSTGRES_DB: ${POSTGRES_DB:-wms_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms_user} -d ${POSTGRES_DB:-wms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
